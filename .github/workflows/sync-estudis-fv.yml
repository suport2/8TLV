name: Sync estudis-fv to Monitoreig

on:
  push:
    branches: [main]
    paths:
      - 'index.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 8TLV
        uses: actions/checkout@v4

      - name: Checkout Monitoreig
        uses: actions/checkout@v4
        with:
          repository: suport2/Monitoreig
          token: ${{ secrets.MONITOREIG_TOKEN }}
          path: monitoreig

      - name: Copy index.html
        run: cp index.html monitoreig/frontend/public/estudis-fv.html

      - name: Commit and push to Monitoreig
        run: |
          cd monitoreig
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/estudis-fv.html
          git diff --staged --quiet || git commit -m "sync: update estudis-fv.html from 8TLV"
          git push
